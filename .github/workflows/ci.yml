name: Execute CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-coverage:
    name: Unit + Coverage >90%
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Validate backend coverage > 90%
        working-directory: backend
        run: |
          node -e "const fs=require('fs');const p='coverage/coverage-summary.json';if(!fs.existsSync(p)){console.error('coverage-summary.json not found in backend');process.exit(1)}const s=JSON.parse(fs.readFileSync(p,'utf8'));const t=s.total;const metrics=['lines','functions','branches','statements'];const bad=metrics.filter(m=>!(t[m]&&t[m].pct>90));if(bad.length){console.error('Backend coverage must be > 90% for: '+bad.map(m=>m+'='+t[m].pct+'%').join(', '));process.exit(1)}console.log('Backend coverage validated:',metrics.map(m=>m+': '+t[m].pct+'%').join(', '));"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Validate frontend coverage > 90%
        working-directory: frontend
        run: |
          node -e "const fs=require('fs');const p='coverage/coverage-summary.json';if(!fs.existsSync(p)){console.error('coverage-summary.json not found in frontend');process.exit(1)}const s=JSON.parse(fs.readFileSync(p,'utf8'));const t=s.total;const metrics=['lines','functions','branches','statements'];const bad=metrics.filter(m=>!(t[m]&&t[m].pct>90));if(bad.length){console.error('Frontend coverage must be > 90% for: '+bad.map(m=>m+'='+t[m].pct+'%').join(', '));process.exit(1)}console.log('Frontend coverage validated:',metrics.map(m=>m+': '+t[m].pct+'%').join(', '));"
