name: Execute CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-coverage:
    name: Unit + Coverage >90%
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Validate backend coverage > 90%
        working-directory: backend
        run: |
          node -e "const fs=require('fs');const p='coverage/coverage-summary.json';if(!fs.existsSync(p)){console.error('coverage-summary.json not found in backend');process.exit(1)}const s=JSON.parse(fs.readFileSync(p,'utf8'));const t=s.total;const metrics=['lines','functions','branches','statements'];const bad=metrics.filter(m=>!(t[m]&&t[m].pct>90));if(bad.length){console.error('Backend coverage must be > 90% for: '+bad.map(m=>m+'='+t[m].pct+'%').join(', '));process.exit(1)}console.log('Backend coverage validated:',metrics.map(m=>m+': '+t[m].pct+'%').join(', '));"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Validate frontend coverage > 90%
        working-directory: frontend
        run: |
          node -e "const fs=require('fs');const p='coverage/coverage-summary.json';if(!fs.existsSync(p)){console.error('coverage-summary.json not found in frontend');process.exit(1)}const s=JSON.parse(fs.readFileSync(p,'utf8'));const t=s.total;const metrics=['lines','functions','branches','statements'];const bad=metrics.filter(m=>!(t[m]&&t[m].pct>90));if(bad.length){console.error('Frontend coverage must be > 90% for: '+bad.map(m=>m+'='+t[m].pct+'%').join(', '));process.exit(1)}console.log('Frontend coverage validated:',metrics.map(m=>m+': '+t[m].pct+'%').join(', '));"

  e2e-playwright:
    name: E2E Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [unit-coverage]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start backend server
        working-directory: backend
        run: |
          npm run dev > ../backend.log 2>&1 &
          echo $! > ../backend.pid

      - name: Start frontend
        working-directory: frontend
        run: |
          npm run dev -- --host 0.0.0.0 --port 3000 > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid

      - name: Wait for servers
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:5001/api/health >/dev/null \
              && curl -fsS http://localhost:3000 >/dev/null; then
              echo "All services are ready"
              exit 0
            fi
            echo "Waiting for services... ($i/60)"
            sleep 2
          done

          echo "Services did not become ready in time"
          echo "--- backend.log ---"
          cat backend.log || true
          echo "--- frontend.log ---"
          cat frontend.log || true
          exit 1

      - name: Run E2E tests
        run: npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Stop background servers
        if: always()
        run: |
          for pid_file in backend.pid frontend.pid; do
            if [ -f "$pid_file" ]; then
              kill "$(cat "$pid_file")" || true
            fi
          done
